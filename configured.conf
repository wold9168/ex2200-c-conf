version 12.3R9.4;
system {
    host-name tough-ex2200-c;
    root-authentication {
        encrypted-password "SECRET"; ## SECRET-DATA
    }
    services {
        ssh {
            root-login allow;
            protocol-version v2;
        }
        web-management {
            http;
        }
        dhcp {
            traceoptions {
                file dhcpdlog;
                level all;
                flag all;
            }
            pool 192.168.11.0/24 {
                address-range low 192.168.11.10 high 192.168.11.253;
                router {
                    192.168.11.1;
                }
            }
            pool 192.168.12.0/24 {
                address-range low 192.168.12.10 high 192.168.12.253;
                router {
                    192.168.12.1;
                }
            }
        }
    }
    syslog {
        user * {
            any emergency;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
}
interfaces {
    interface-range PERSONAL {
        member-range ge-0/0/1 to ge-0/0/11;
        unit 0 {
            family ethernet-switching {
                port-mode access;
                vlan {
                    members personal;
                }
            }
        }
    }
    ge-0/0/0 {
        unit 0 {
            family ethernet-switching {
                port-mode trunk;
                vlan {
                    members [ upstream routing ];
                }
            }
        }
    }
    ge-0/1/0 {
        unit 0 {
            family ethernet-switching {
                port-mode access;
                vlan {
                    members upstream;
                }
            }
        }
    }
    ge-0/1/1 {
        unit 0 {
            family ethernet-switching {
                port-mode access;
                vlan {
                    members upstream;
                }
            }
        }
    }
    me0 {
        unit 0 {
            family inet {
                address 192.168.11.2/24 {
                    primary;
                }
            }
            family inet6 {
                address fd00:11::2/64;
            }
        }
    }
    vlan {
        unit 10 {
            family inet {
                address 192.168.10.1/24;
            }
            family inet6 {
                address fd00:10::1/64;
            }
        }
        unit 11 {
            family inet {
                address 192.168.11.1/24;
            }
            family inet6 {
                address fd00:11::1/64;
            }
        }
        unit 12 {
            family inet {
                address 192.168.12.1/24;
            }
            family inet6 {
                address fd00:12::1/64;
            }
        }
        unit 13 {
            family inet {
                address 192.168.13.1/24;
            }
            family inet6 {
                address fd00:13::1/64;
            }
        }
    }
}
forwarding-options {
    dhcp-relay {
        dhcpv6 {
            group VLAN12 {
                interface vlan.12;
            }
            server-group {
                ROUTER {
                    fd00:10::2;
                }
            }
            active-server-group ROUTER;
        }
    }
}
routing-options {
    rib inet6.0 {
        static {
            route ::/0 next-hop fd00:10::2;
        }
    }
    static {
        route 0.0.0.0/0 next-hop 192.168.10.2;
    }
}
protocols {
    router-advertisement {
        interface vlan.12 {
            other-stateful-configuration;
            prefix fd00:12::/64;
        }
    }
    igmp-snooping {
        vlan all;
    }
    rstp;
    lldp {
        interface all;
    }
    lldp-med {
        interface all;
    }
}
ethernet-switching-options {
    storm-control {
        interface all;
    }
}
vlans {
    management {
        vlan-id 11;
        l3-interface vlan.11;
    }
    personal {
        vlan-id 12;
        l3-interface vlan.12;
    }
    routing {
        vlan-id 10;
        l3-interface vlan.10;
    }
    upstream {
        vlan-id 9;
    }
    vm {
        vlan-id 13;
        l3-interface vlan.13;
    }
}
